name: CI

on:
  push:
    branches: [dev]
    paths-ignore: ['**.md', 'docs/**']
  pull_request:
    branches: [master]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      opencode: ${{ steps.filter.outputs.opencode }}
      claude-code: ${{ steps.filter.outputs.claude-code }}
      github-config: ${{ steps.filter.outputs.github-config }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            opencode:
              - 'opencode/**'
            claude-code:
              - 'claude-code/**'
            github-config:
              - '.github/**'
              - 'lefthook.yml'

  test-opencode:
    needs: changes
    if: needs.changes.outputs.opencode == 'true' || needs.changes.outputs.github-config == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: cd opencode && bun install --frozen-lockfile
      - run: cd opencode && bun test scripts/tests/

  test-claude-code:
    needs: changes
    if: needs.changes.outputs.claude-code == 'true' || needs.changes.outputs.github-config == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "claude-code/cli/uv.lock"
      - run: cd claude-code/cli && uv sync --frozen
      - run: cd claude-code/cli && uv run pytest -x -q --tb=short

  security-scan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
