name: CI

on:
  push:
    branches: [dev]
    paths-ignore: ['**.md', 'docs/**']
  pull_request:
    branches: [master]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      opencode: ${{ steps.filter.outputs.opencode }}
      claude-code: ${{ steps.filter.outputs.claude-code }}
      github-config: ${{ steps.filter.outputs.github-config }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            opencode:
              - 'opencode/**'
            claude-code:
              - 'claude-code/**'
            github-config:
              - '.github/**'
              - 'lefthook.yml'

  test-claude-code:
    needs: changes
    if: needs.changes.outputs.claude-code == 'true' || needs.changes.outputs.github-config == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "claude-code/cli/uv.lock"
      - run: cd claude-code/cli && uv sync --frozen
      - run: cd claude-code/cli && uv run pytest -x -q --tb=short

