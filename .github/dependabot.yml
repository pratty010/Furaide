version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      github-actions:
        patterns: ["*"]
    commit-message:
      prefix: "ci(deps)"
    labels: ["dependencies", "ci"]

  - package-ecosystem: "npm"
    directory: "/opencode"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    groups:
      minor-patch:
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "chore(deps/opencode)"
    labels: ["dependencies", "opencode"]

  - package-ecosystem: "pip"
    directory: "/claude-code/cli"
    schedule:
      interval: "weekly"
      day: "tuesday"
    open-pull-requests-limit: 3
    groups:
      minor-patch:
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "chore(deps/cli)"
    labels: ["dependencies", "claude-code"]
